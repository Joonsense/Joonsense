version: '3.8'
services:
  n8n:
    image: n8nio/n8n
    ports:
      - '5678:5678'
    volumes:
      - ./n8n-workflow.json:/workflows/workflow.json
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=user
      - N8N_BASIC_AUTH_PASSWORD=pass
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  studio:
    image: supabase/studio:latest
    ports:
      - '8080:8080'
